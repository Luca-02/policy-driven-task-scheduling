apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8svalidatetaskrequestdatasets
spec:
  crd:
    spec:
      names:
        kind: K8sValidateTaskRequestDatasets
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8svalidatetaskrequestdatasets

        # ---------------------------------------------------------------------
        # Resolve dataset metadata from the external dataset-service (EDP).
        # Only called when the TaskRequest actually declares datasets.
        # ---------------------------------------------------------------------
        datasets := input.review.object.spec.datasets

        # Violation: the provider reported a system-wide failure.
        violation[{"msg": msg}] {
          datasets != null
          count(datasets) > 0
          response := external_data({
            "provider": "dataset-service",
            "keys": datasets,
          })
          response.systemError != ""
          msg := sprintf("Dataset provider system error: %v", [response.systemError])
        }

        # Violation: a requested dataset does not exist (per-key error).
        violation[{"msg": msg}] {
          datasets != null
          count(datasets) > 0
          response := external_data({
            "provider": "dataset-service",
            "keys": datasets,
          })
          some i
          item := response.items[i]
          item.error != ""
          msg := sprintf("Dataset validation failed: %v", [item.error])
        }
