apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dataset-service
  namespace: dataset-service
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dataset-service
  policyTypes: [Ingress, Egress]
  # Allow ingress traffic from gatekeeper-system and
  # taskrequest-controller namespaces on port 8443
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dataset-service
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gatekeeper-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: task-request-controller
      ports:
        - port: 8443
          protocol: TCP
  # Allow egress traffic to DNS and dataset-db cluster on port 5432
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: dataset-db
      ports:
        - port: 5432
          protocol: TCP
