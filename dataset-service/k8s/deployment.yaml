apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataset-service
  namespace: dataset-service
  labels:
    app.kubernetes.io/name: dataset-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dataset-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dataset-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        # fsGroup makes the mounted writable volumes group-owned by the app user,
        # required because the root filesystem is read-only.
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        # TinyDB JSON file lives here (writable). emptyDir => reseeded on restart.
        # Swap for a PVC if you want persistence across pod restarts.
        - name: data
          emptyDir:
            sizeLimit: 32Mi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        # TLS material consumed by uvicorn (--ssl-keyfile / --ssl-certfile).
        - name: tls
          secret:
            secretName: dataset-service-tls
      containers:
        - name: dataset-service
          image: dataset-service:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop:
                - ALL
          env:
            - name: DB_PATH
              value: /data/datasets.json
            - name: SEED_PATH
              value: /app/seed.json
            - name: PORT
              value: "8443"
            - name: LOG_LEVEL
              value: INFO
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: tls
              mountPath: /tls
              readOnly: true
