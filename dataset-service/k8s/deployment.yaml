apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataset-service
  namespace: dataset-service
  labels:
    app.kubernetes.io/name: dataset-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: dataset-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dataset-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: data
          emptyDir:
            sizeLimit: 32Mi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        - name: tls
          secret:
            secretName: dataset-service-tls
      containers:
        - name: dataset-service
          image: dataset-service:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop: ["ALL"]
          env:
            # Ready-to-use connection URI generated by CloudNativePG; the host
            # is the -rw service, so writes always reach the current primary.
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: dataset-db-app
                  key: uri
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8443"
            - name: TLS_CERT_FILE
              value: "/tls/tls.crt"
            - name: TLS_KEY_FILE
              value: "/tls/tls.key"
            - name: LOG_LEVEL
              value: "INFO"
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 15
            timeoutSeconds: 2
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            timeoutSeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: tls
              mountPath: /tls
              readOnly: true
