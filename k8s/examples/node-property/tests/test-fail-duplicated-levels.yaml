apiVersion: policydriven.unimi.it/v1alpha1
kind: NodeProperty
metadata:
  name: test-fail-duplicated-levels
spec:
  levels:
    - level: 1
      disjunction:
        - clause:
            - key: some-key
              operator: Eq
              values: ["val"]
    - level: 1
      disjunction:
        - clause:
            - key: some-key
              operator: Gt
              values: [1]