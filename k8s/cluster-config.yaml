apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
  - role: control-plane
  - role: worker
    labels:
      attribute.node.policydriven.unimi.it/cert: certA
      attribute.node.policydriven.unimi.it/isolation: strict
      attribute.node.policydriven.unimi.it/gpu: a100
      attribute.node.policydriven.unimi.it/cpu: 16
  - role: worker
    labels:
      attribute.node.policydriven.unimi.it/cert: certB
      attribute.node.policydriven.unimi.it/isolation: standard
      attribute.node.policydriven.unimi.it/gpu: t4
      attribute.node.policydriven.unimi.it/cpu: 8
  - role: worker
    labels:
      attribute.node.policydriven.unimi.it/cert: certC
      attribute.node.policydriven.unimi.it/isolation: standard
      attribute.node.policydriven.unimi.it/cpu: 4
  - role: worker
    labels:
      attribute.node.policydriven.unimi.it/cert: certC
      attribute.node.policydriven.unimi.it/isolation: strict
      attribute.node.policydriven.unimi.it/gpu: a100
      attribute.node.policydriven.unimi.it/cpu: 24
  - role: worker
    labels:
      attribute.node.policydriven.unimi.it/cert: certA
      attribute.node.policydriven.unimi.it/isolation: strict
      attribute.node.policydriven.unimi.it/cpu: 4
