apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: node-property-definitions.thesis.io
spec:
  group: thesis.io
  names:
    kind: NodePropertyDefinition
    listKind: NodePropertyDefinitionList
    plural: node-property-definitions
    singular: node-property-definition
    shortNames:
      - nprdef
  # Cluster-scoped since they are referenced by node properties across the cluster
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["levels"]
              properties:
                levels:
                  type: array
                  minItems: 1
                  maxItems: 32
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: ["level"]
                  description: >
                    List of levels for this property (level 0 = always true is implicit and must not be defined here). 
                    Each level has an integer index and a DNF expression: a list of clauses, where each clause is a list of atomic conditions.
                  items:
                    type: object
                    required: ["level", "disjunction"]
                    properties:
                      level:
                        type: integer
                        minimum: 1
                        description: "Level of the property."
                      disjunction:
                        type: array
                        minItems: 1
                        maxItems: 32
                        x-kubernetes-list-type: set
                        description: List of clauses of the disjunction, where each clause is a list of atomic conditions.
                        items:
                          type: object
                          x-kubernetes-map-type: atomic
                          required: ["clause"]
                          properties:
                            clause:
                              type: array
                              minItems: 1
                              maxItems: 32
                              x-kubernetes-list-type: set
                              description: List of atomic conditions in the clause.
                              items:
                                type: object
                                x-kubernetes-map-type: atomic
                                required: ["key", "operator"]
                                x-kubernetes-validations:
                                  # Eq/NotEq/Gt/Lt/Gte/Lte -> exactly one value is required
                                  - rule: |
                                      (self.operator in ['Eq', 'NotEq', 'Gt', 'Lt', 'Gte', 'Lte'])
                                      ? has(self.values) && size(self.values) == 1 
                                      : true
                                    message: "Eq/NotEq/Gt/Lt/Gte/Lte require exactly one value"
                                  # In/NotIn -> at least one value is required
                                  - rule: |
                                      (self.operator in ['In', 'NotIn'])
                                      ? has(self.values) && size(self.values) > 0
                                      : true
                                    message: "In/NotIn require at least one value"
                                  # Gt/Lt/Gte/Lte -> the value must be an integer 
                                  - rule: | 
                                      (self.operator in ['Gt', 'Lt', 'Gte', 'Lte']) 
                                      ? self.values.all(v, type(v) == int) 
                                      : true 
                                    message: "Gt/Lt/Gte/Lte require integer values"
                                  # Exists/NotExists -> values do not have to be set
                                  - rule: |
                                      (self.operator in ['Exists', 'NotExists'])
                                      ? !has(self.values)
                                      : true
                                    message: "values must not be set for Exists/NotExists"
                                properties:
                                  key:
                                    type: string
                                    pattern: "^[a-zA-Z0-9._-]+$"
                                    minLength: 1
                                    maxLength: 64
                                  operator:
                                    type: string
                                    enum: ["Eq", "NotEq", "Gt", "Lt", "Gte", "Lte", "In", "NotIn", "Exists", "NotExists"]
                                  values:
                                    type: array
                                    minItems: 1
                                    maxItems: 32
                                    items:
                                      x-kubernetes-int-or-string: true
