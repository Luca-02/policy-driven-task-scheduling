apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: geographicalgroups.policydriven.unimi.it
spec:
  group: policydriven.unimi.it
  names:
    kind: GeographicalGroup
    listKind: GeographicalGroupList
    plural: geographicalgroups
    singular: geographicalgroup
    shortNames:
      - geo
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              description: >
                A geographic group is either a leaf group (defines locations directly), 
                a composite group (includes other GeographicalGroup by name), or both. 
                At least one of locations or includes must be specified.
              x-kubernetes-validations:
                - rule: "(has(self.locations) && size(self.locations) > 0) || (has(self.includes) && size(self.includes) > 0)"
                  message: "at least one of locations or includes must be non-empty"
              properties:
                locations:
                  type: array
                  maxItems: 32
                  x-kubernetes-list-type: set
                  description: >
                    Direct location strings belonging to this group.
                  items:
                    type: string
                    minLength: 1
                    maxLength: 254
                includes:
                  type: array
                  maxItems: 32
                  x-kubernetes-list-type: set
                  description: >
                    Names of other GeographicalGroup CRs whose 
                    locations are included in this group.
                  items:
                    type: string
                    minLength: 1
                    maxLength: 254
 