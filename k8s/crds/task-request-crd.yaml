apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: taskrequests.policydriven.unimi.it
spec:
  group: policydriven.unimi.it
  names:
    kind: TaskRequest
    listKind: TaskRequestList
    plural: taskrequests
    singular: taskrequest
    shortNames:
      - treq
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Job
          type: string
          jsonPath: .status.jobName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                # β(t): minimum property levels required by the task.
                # Keys are NodeProperty names.
                # Omitted properties default to level 0 (no requirement).
                requirements:
                  type: object
                  description: >
                    Minimum property levels required by the task (β(t)).
                    Keys must match existing NodeProperty names.
                  additionalProperties:
                    type: integer
                    minimum: 0
                # req(t): datasets required for task execution.
                datasets:
                  type: array
                  description: >
                    Dataset names required for task execution (req(t)).
                    Each name is resolved against the external dataset service.
                  items:
                    type: string
                    minLength: 1
                    maxLength: 254
            status:
              type: object
              # Status is managed exclusively by the TaskRequest controller
              # via the /status subresource endpoint. Direct writes to the
              # main resource endpoint do not update this field.
              properties:
                phase:
                  type: string
                  description: >
                    Current phase of the TaskRequest lifecycle.
                    - Pending: accepted, awaiting Job creation.
                    - Scheduled: Job created and submitted to the scheduler.
                    - Complete: Job completed successfully.
                    - Failed: terminal failure (dataset error, Job failure, etc.).
                  enum: ["Pending", "Scheduled", "Complete", "Failed"]
                job:
                  type: string
                  description: Name of the Job related to this TaskRequest.
                message:
                  type: string
                  description: Message describing the current status or failure reason.