apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8svalidatetaskrequestdatasetserror
spec:
  crd:
    spec:
      names:
        kind: K8sValidateTaskRequestDatasetsError
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8svalidatetaskrequestdatasetserror

        datasets := input.review.object.spec.datasets

        # ---------------------------------------------------------------------
        # Violation 1: the provider reported a system-wide failure.
        # ---------------------------------------------------------------------
        violation[{"msg": msg}] {
          datasets := input.review.object.spec.datasets
          datasets != null

          response := external_data({
            "provider": "dataset-service",
            "keys": datasets,
          })

          response.systemError != ""

          msg := sprintf("Dataset provider system error: %v", [response.systemError])
        }

        # ---------------------------------------------------------------------
        # Violation 2: a requested dataset is invalid or unavailable.
        # ---------------------------------------------------------------------
        violation[{"msg": msg}] {
          datasets != null

          response := external_data({
            "provider": "dataset-service",
            "keys": datasets,
          })

          some i
          item := response.items[i]
          item.error != ""

          msg := sprintf("Dataset validation failed: %v", [item])
        }
