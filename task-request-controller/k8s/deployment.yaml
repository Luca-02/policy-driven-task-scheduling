apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskrequest-controller
  namespace: taskrequest-controller
  labels:
    app.kubernetes.io/name: taskrequest-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: taskrequest-controller
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taskrequest-controller
    spec:
      serviceAccountName: taskrequest-controller-service-account
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
        - name: dataset-service-ca
          secret:
            secretName: dataset-service-tls
            items:
              - key: ca.crt
                path: ca.crt
      containers:
        - name: taskrequest-controller
          image: taskrequest-controller:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: GROUP
              value: "policydriven.unimi.it"
            - name: VERSION
              value: "v1alpha1"
            - name: TASK_REQUESTS_PLURAL
              value: "taskrequests"
            - name: TASK_NAMESPACE
              value: "compute"
            - name: DATASET_SERVICE_URL
              value: "https://dataset-service.dataset-service.svc.cluster.local"
            - name: CA_CERT_FILE
              value: "/tls/ca.crt"
            - name: JOB_LABEL_PREFIX
              value: "scheduling.task.policydriven.unimi.it"
            - name: JOB_ANNOTATION_PREFIX
              value: "scheduling.task.policydriven.unimi.it"
            - name: LOG_LEVEL
              value: "INFO"
          ports:
            - name: health
              containerPort: 9091
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            timeoutSeconds: 2
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            timeoutSeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: dataset-service-ca
              mountPath: /tls
              readOnly: true
      # Schedule the controller on control-plane nodes
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
