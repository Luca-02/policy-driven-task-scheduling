apiVersion: v1
kind: ServiceAccount
metadata:
  name: taskrequest-controller-service-account
  namespace: taskrequest-controller
---
# ClusterRole: permissions needed by the controller across the cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: taskrequest-controller-cluster-role
rules:
  # Read and manage TaskRequests in any namespace
  - apiGroups: [policydriven.unimi.it]
    resources: [taskrequests]
    verbs: [get, list, watch, patch]
  # Update TaskRequest status exclusively via the /status subresource.
  - apiGroups: [policydriven.unimi.it]
    resources: [taskrequests/status]
    verbs: [get, patch, update]
  # Read GeographicalGroups
  - apiGroups: [policydriven.unimi.it]
    resources: [geographicalgroups]
    verbs: [get, list, watch]
  # Create and watch Jobs.
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, delete]
  # Kopf posts events about its activity
  - apiGroups: [""]
    resources: [events]
    verbs: [create]
  # Kopf uses leases for peer-detection and leader election
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  # Read CRD definitions to check if the CRD is present before starting the operator
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: taskrequest-controller-cluster-role-binding
subjects:
  - kind: ServiceAccount
    name: taskrequest-controller-service-account
    namespace: taskrequest-controller
roleRef:
  kind: ClusterRole
  name: taskrequest-controller-cluster-role
  apiGroup: rbac.authorization.k8s.io
---
# Role scoped to the compute namespace: allows external users to submit
# TaskRequests. Deliberately excludes create on Jobs and Pods — only the
# controller's service account (via the ClusterRole above) can create Jobs.
# apiVersion: rbac.authorization.k8s.io/v1
# kind: Role
# metadata:
#   name: task-submitter
#   namespace: compute
# rules:
#   - apiGroups: [policydriven.unimi.it]
#     resources: [taskrequests]
#     verbs: [create, get, list, watch, delete]
  # taskrequests/status is intentionally omitted: only the controller
  # may write the status subresource.
---
