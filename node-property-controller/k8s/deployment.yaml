apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-property-operator
  namespace: node-property-operator
  labels:
    app.kubernetes.io/name: node-property-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: node-property-operator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-property-operator
    spec:
      serviceAccountName: node-property-operator
      containers:
        - name: operator
          image: node-property-operator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: GROUP
              value: thesis.io
            - name: VERSION
              value: v1alpha1
            - name: PLURAL
              value: node-property-definitions
            - name: ATTRIBUTE_PREFIX
              value: attribute.node.thesis.io
            - name: PROPERTY_PREFIX
              value: property.node.thesis.io
            - name: LOG_LEVEL
              value: INFO
          ports:
            - name: health
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      terminationGracePeriodSeconds: 30