apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-property-controller
  namespace: node-property-controller
  labels:
    app.kubernetes.io/name: node-property-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: node-property-controller
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-property-controller
    spec:
      serviceAccountName: node-property-controller-service-account
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
      containers:
        - name: node-property-controller
          image: node-property-controller:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: GROUP
              value: "policydriven.unimi.it"
            - name: VERSION
              value: "v1alpha1"
            - name: NODE_PROPERTIES_PLURAL
              value: "nodeproperties"
            - name: ATTRIBUTE_PREFIX
              value: "attribute.node.policydriven.unimi.it"
            - name: PROPERTY_PREFIX
              value: "property.node.policydriven.unimi.it"
            - name: LOG_LEVEL
              value: "INFO"
          ports:
            - name: health
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            timeoutSeconds: 2
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            timeoutSeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      # Schedule the controller on control-plane nodes
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
