apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-property-controller
  namespace: node-property-controller
  labels:
    app.kubernetes.io/name: node-property-controller
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: node-property-controller
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-property-controller
    spec:
      serviceAccountName: node-property-controller-service-account
      terminationGracePeriodSeconds: 30
      # Run the operator as the distroless nonroot user for security best practices
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # Volumes for the operator since read-only root filesystem is enabled
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
      containers:
        - name: operator
          image: node-property-controller:latest
          imagePullPolicy: IfNotPresent
          # Set security context for the container 
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop:
                - ALL
          env:
            - name: ATTRIBUTE_PREFIX
              value: attribute.node
            - name: PROPERTY_PREFIX
              value: property.node
            - name: LOG_LEVEL
              value: INFO
            - name: LEADER_ELECTION
              value: "true"
            - name: LEADER_ELECTION_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: health
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            timeoutSeconds: 2
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            timeoutSeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      # Schedule the operator on control-plane nodes to ensure it runs even in tainted environments
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule