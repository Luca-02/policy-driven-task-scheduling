apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-property-operator
  namespace: node-property-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-property-operator
rules:
  # Read and patch nodes (the heart of the operator)
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch, patch]
  # Watch NodePropertyDefinition CRs
  - apiGroups: [thesis.io]
    resources: [node-property-definitions]
    verbs: [get, list, watch, patch, update]
  # Kopf finalizers and progress annotations require updating the CR
  - apiGroups: [thesis.io]
    resources: [node-property-definitions/status]
    verbs: [get, patch, update]
  # Kopf posts events about its activity
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  # Kopf uses leases for peer-detection / leader election
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  # Read CRD definitions to check if the CRD is present before starting the operator
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-property-operator
subjects:
  - kind: ServiceAccount
    name: node-property-operator
    namespace: node-property-operator
roleRef:
  kind: ClusterRole
  name: node-property-operator
  apiGroup: rbac.authorization.k8s.io