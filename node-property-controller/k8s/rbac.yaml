apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-property-controller-service-account
  namespace: node-property-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-property-controller-cluster-role
rules:
  # Read node state through informer caches and patch computed property labels.
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch, patch]
  # Watch cluster-scoped NodeProperty resources with a dynamic informer.
  - apiGroups: [policydriven.unimi.it]
    resources: [nodeproperties]
    verbs: [get, list, watch]
  # Client-go leader election stores the HA lock in a coordination.k8s.io Lease.
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-property-controller-cluster-role-binding
subjects:
  - kind: ServiceAccount
    name: node-property-controller-service-account
    namespace: node-property-controller
roleRef:
  kind: ClusterRole
  name: node-property-controller-cluster-role
  apiGroup: rbac.authorization.k8s.io
